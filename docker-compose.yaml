version: '3.8'

services:
  daily-updates:
    image: alpine:latest
    container_name: self-news-feed-updater
    volumes:
      - ./scripts:/scripts
      - ./self-news-feed/src/data:/output
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    command: >
      sh -c "
      apk add --no-cache bash curl jq &&
      chmod +x /scripts/fetch-daily-updates.sh &&
      echo '0 9 * * * /scripts/fetch-daily-updates.sh > /proc/1/fd/1 2>&1' > /etc/crontabs/root &&
      crond -f
      "
    restart: unless-stopped